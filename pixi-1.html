<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Psychedelic Fractal Tunnel + Chromatic Aberration</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      width: 100%;
      height: 100%;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/8.1.5/pixi.min.js"></script>
<script type="module">
  const app = new PIXI.Application();
  await app.init({
    resizeTo: window,
    background: "#000000",
    antialias: true
  });
  document.body.appendChild(app.canvas);

  const width = app.renderer.width;
  const height = app.renderer.height;
  const center = { x: width / 2, y: height / 2 };

  const RING_COUNT = 45;
  const SEGMENTS = 80;
  const BASE_RADIUS = Math.min(width, height) * 0.06;
  const RADIUS_STEP = Math.min(width, height) * 0.022;

  const SPEED = 0.035;
  const ROT_SPEED = 0.002;
  const NOISE_INTENSITY = 0.55;
  const NOISE_SCALE = 0.7;

  function rand(seed) {
    const x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }

  function valueNoise2D(x, y) {
    const x0 = Math.floor(x), y0 = Math.floor(y);
    const x1 = x0 + 1, y1 = y0 + 1;
    const sx = x - x0, sy = y - y0;

    const smooth = t => t * t * (3 - 2 * t);

    const n00 = rand(x0 * 15731 + y0 * 789221);
    const n10 = rand(x1 * 15731 + y0 * 789221);
    const n01 = rand(x0 * 15731 + y1 * 789221);
    const n11 = rand(x1 * 15731 + y1 * 789221);

    const ix0 = n00 + (n10 - n00) * smooth(sx);
    const ix1 = n01 + (n11 - n01) * smooth(sx);
    return ix0 + (ix1 - ix0) * smooth(sy);
  }

  const container = new PIXI.Container();
  container.x = center.x;
  container.y = center.y;
  app.stage.addChild(container);

  const rings = [];
  for (let i = 0; i < RING_COUNT; i++) {
    const g = new PIXI.Graphics();
    container.addChild(g);
    rings.push(g);
  }

  let time = 0;

  function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const k = n => (n + h / 30) % 12;
    const a = s * Math.min(l, 1 - l);
    const f = n => {
      const v = l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
      return Math.round(255 * v);
    };
    return (f(0) << 16) + (f(8) << 8) + f(4);
  }

  app.ticker.add(delta => {
    time += delta;

    const t = time * SPEED;

    for (let i = 0; i < RING_COUNT; i++) {
      const g = rings[i];
      g.clear();

      const depth = (i + t) / RING_COUNT;
      const radius = BASE_RADIUS + depth * RING_COUNT * RADIUS_STEP;

      const hue = (time * 0.8 + depth * 720) % 360;
      const sat = 70 + Math.sin(time * 0.03 + depth * 5) * 20;
      const lit = 45 + Math.sin(time * 0.05 + depth * 8) * 10;

      const color = hslToHex(hue, sat, lit);
      const alpha = 1 - depth;

      g.lineStyle({ width: 2, color, alpha });

      const rotation = depth * Math.PI * 2 + time * ROT_SPEED * 200;

      let first = null;

      for (let s = 0; s <= SEGMENTS; s++) {
        const angle = (s / SEGMENTS) * Math.PI * 2 + rotation;

        const nx = Math.cos(angle) * NOISE_SCALE + time * 0.06;
        const ny = Math.sin(angle) * NOISE_SCALE + time * 0.06;

        const n1 = valueNoise2D(nx, ny) * 2 - 1;
        const n2 = valueNoise2D(nx * 2.3, ny * 2.3) * 2 - 1;

        const noise = (n1 * 0.6 + n2 * 0.4) * NOISE_INTENSITY * (1 - depth);

        const r = radius * (1 + noise);
        const x = Math.cos(angle) * r;
        const y = Math.sin(angle) * r;

        if (s === 0) {
          g.moveTo(x, y);
          first = { x, y };
        } else {
          g.lineTo(x, y);
        }
      }

      if (first) g.lineTo(first.x, first.y);
    }

    container.rotation += ROT_SPEED * delta;
  });

  // --- Chromatic Aberration Shader ---
  const chromaFrag = `
    precision mediump float;

    varying vec2 vTextureCoord;
    uniform sampler2D uTexture;
    uniform float uOffset;

    void main() {
      vec2 uv = vTextureCoord;

      vec2 rUV = uv + vec2(uOffset, 0.0);
      vec2 gUV = uv;
      vec2 bUV = uv - vec2(uOffset, 0.0);

      float r = texture2D(uTexture, rUV).r;
      float g = texture2D(uTexture, gUV).g;
      float b = texture2D(uTexture, bUV).b;

      gl_FragColor = vec4(r, g, b, 1.0);
    }
  `;

  const chromaFilter = new PIXI.Filter(undefined, chromaFrag, {
    uOffset: 0.002
  });

  app.stage.filters = [chromaFilter];

  app.ticker.add(() => {
    chromaFilter.uniforms.uOffset = 0.002 + Math.sin(time * 0.02) * 0.0015;
  });

  window.addEventListener("resize", () => {
    container.x = app.renderer.width / 2;
    container.y = app.renderer.height / 2;
  });
</script>
</body>
</html>
