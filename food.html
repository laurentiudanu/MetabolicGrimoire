<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Food Macro & Micro Lookup (API v2)</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: #eee;
        padding: 20px;
    }
    input {
        width: 300px;
        padding: 10px;
        font-size: 16px;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        margin-left: 10px;
        cursor: pointer;
    }
    #result {
        margin-top: 30px;
        padding: 20px;
        background: #222;
        border-radius: 8px;
    }
    .section-title {
        margin-top: 20px;
        font-size: 20px;
        color: #7dd;
    }
    img {
        max-width: 200px;
        margin-top: 10px;
        border-radius: 6px;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
    }
    td {
        padding: 6px;
        border-bottom: 1px solid #444;
    }
</style>
</head>
<body>

<h1>Food Macro & Micro Lookup (API v2)</h1>

<input id="searchInput" placeholder="Search for a food (e.g., banana)" />
<button onclick="searchFood()">Search</button>

<div id="result"></div>

<script>
async function searchFood() {
    const query = document.getElementById("searchInput").value.trim();
    if (!query) return;

    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "Searching...";

    // API v2 search endpoint
    const searchUrl = `https://world.openfoodfacts.net/api/v2/search?fields=code,product_name,brands,image_front_url&limit=1&sort_by=popularity_key&search_terms=${encodeURIComponent(query)}`;

    const searchRes = await fetch(searchUrl);
    const searchData = await searchRes.json();

    if (!searchData.products || searchData.products.length === 0) {
        resultDiv.innerHTML = "No results found.";
        return;
    }

    const product = searchData.products[0];
    const code = product.code;

    // Fetch full product details using API v2
    const productUrl = `https://world.openfoodfacts.net/api/v2/product/${code}`;
    const productRes = await fetch(productUrl);
    const productData = await productRes.json();

    if (!productData.product) {
        resultDiv.innerHTML = "Product details unavailable.";
        return;
    }

    const p = productData.product;
    const nutr = p.nutriments || {};

    // Macros
    const macros = [
        ["Energy (kcal)", nutr["energy-kcal_100g"]],
        ["Protein (g)", nutr["proteins_100g"]],
        ["Carbs (g)", nutr["carbohydrates_100g"]],
        ["Sugars (g)", nutr["sugars_100g"]],
        ["Fat (g)", nutr["fat_100g"]],
        ["Saturated Fat (g)", nutr["saturated-fat_100g"]],
        ["Fiber (g)", nutr["fiber_100g"]],
        ["Salt (g)", nutr["salt_100g"]],
    ];

    // Micros (dynamic extraction)
    const micros = Object.entries(nutr)
        .filter(([key, val]) =>
            key.includes("_100g") &&
            !key.includes("energy") &&
            !key.includes("carbo") &&
            !key.includes("fat") &&
            !key.includes("protein") &&
            !key.includes("fiber") &&
            !key.includes("sugar") &&
            !key.includes("salt")
        )
        .map(([key, val]) => [
            key.replace("_100g", "").replace(/-/g, " "),
            val
        ]);

    // Render output
    resultDiv.innerHTML = `
        <h2>${p.product_name || "Unnamed Product"}</h2>
        ${p.image_front_url ? `<img src="${p.image_front_url}" />` : ""}

        <div class="section-title">Ingredients</div>
        <div>${p.ingredients_text || "No ingredient list available."}</div>

        <div class="section-title">Macros (per 100g)</div>
        <table>
            ${macros
                .map(([label, val]) => `<tr><td>${label}</td><td>${val ?? "-"}</td></tr>`)
                .join("")}
        </table>

        <div class="section-title">Micros (per 100g)</div>
        <table>
            ${
                micros.length
                    ? micros
                        .map(([label, val]) => `<tr><td>${label}</td><td>${val}</td></tr>`)
                        .join("")
                    : "<tr><td>No micronutrient data available.</td></tr>"
            }
        </table>

        <div class="section-title">Other Info</div>
        <table>
            <tr><td>NOVA Score</td><td>${p.nova_group ?? "-"}</td></tr>
            <tr><td>Brand</td><td>${p.brands || "-"}</td></tr>
            <tr><td>Barcode</td><td>${p.code}</td></tr>
        </table>
    `;
}
</script>

</body>
</html>
