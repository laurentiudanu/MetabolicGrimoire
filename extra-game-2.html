<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Maze Visions</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
    font-family: system-ui, sans-serif;
    color: #eee;
  }
  #gameCanvas {
    display: block;
    background: #000;
  }
  #modal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    z-index: 10;
  }
  #modalBox {
    background: #111;
    border: 1px solid #444;
    padding: 20px 24px;
    max-width: 480px;
    color: #eee;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
  }
  #modalBox h2 {
    margin: 0 0 10px;
    font-size: 18px;
  }
  #modalBox p {
    margin: 0 0 10px;
    line-height: 1.4;
  }
  #modalBox .hint {
    font-size: 12px;
    color: #888;
    margin-top: 8px;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="modal">
  <div id="modalBox">
    <h2>Whisper</h2>
    <p id="modalText"></p>
    <div class="hint">Press Enter or Escape to continue.</div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  /* ============================================================
     RESIZE TO FULL-WINDOW 16:9
  ============================================================ */
  function resizeCanvas() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const ratio = 16 / 9;

    let cw = w;
    let ch = Math.round(w / ratio);

    if (ch > h) {
      ch = h;
      cw = Math.round(h * ratio);
    }

    canvas.width = cw;
    canvas.height = ch;
    canvas.style.position = 'absolute';
    canvas.style.left = ((w - cw) / 2) + 'px';
    canvas.style.top = ((h - ch) / 2) + 'px';
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  /* ============================================================
     MODAL
  ============================================================ */
  const modal = document.getElementById('modal');
  const modalText = document.getElementById('modalText');
  let modalOpen = false;
  let modalCallback = null;

  function openModal(text, cb = null) {
    modalText.textContent = text;
    modal.style.display = 'flex';
    modalOpen = true;
    modalCallback = cb;
  }
  function closeModal() {
    modal.style.display = 'none';
    modalOpen = false;
    if (modalCallback) modalCallback();
    modalCallback = null;
  }

  window.addEventListener('keydown', (e) => {
    if (!modalOpen) return;
    if (e.key === 'Enter' || e.key === 'Escape') {
      e.preventDefault();
      closeModal();
    }
  });

  /* ============================================================
     INPUT
  ============================================================ */
  const keys = {
    ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
    w: false, a: false, s: false, d: false
  };
  window.addEventListener('keydown', (e) => {
    if (modalOpen) return;
    if (e.key in keys) keys[e.key] = true;
  });
  window.addEventListener('keyup', (e) => {
    if (e.key in keys) keys[e.key] = false;
  });

  /* ============================================================
     MAZE GENERATION
  ============================================================ */
  class Maze {
    constructor(cols, rows) {
      this.cols = cols;
      this.rows = rows;
      this.grid = [];

      for (let y = 0; y < rows; y++) {
        const row = [];
        for (let x = 0; x < cols; x++) {
          row.push({
            x, y,
            visited: false,
            walls: { top: true, right: true, bottom: true, left: true }
          });
        }
        this.grid.push(row);
      }
      this.generate();
    }

    cell(x, y) {
      if (x < 0 || y < 0 || x >= this.cols || y >= this.rows) return null;
      return this.grid[y][x];
    }

    generate() {
      const stack = [];
      const start = this.cell(0, 0);
      start.visited = true;
      stack.push(start);

      while (stack.length) {
        const current = stack[stack.length - 1];
        const { x, y } = current;

        const neighbors = [];
        const dirs = [
          { dx: 0, dy: -1, wall: 'top', opp: 'bottom' },
          { dx: 1, dy: 0, wall: 'right', opp: 'left' },
          { dx: 0, dy: 1, wall: 'bottom', opp: 'top' },
          { dx: -1, dy: 0, wall: 'left', opp: 'right' }
        ];

        for (const d of dirs) {
          const n = this.cell(x + d.dx, y + d.dy);
          if (n && !n.visited) neighbors.push({ n, d });
        }

        if (neighbors.length) {
          const { n, d } = neighbors[Math.floor(Math.random() * neighbors.length)];
          current.walls[d.wall] = false;
          n.walls[d.opp] = false;
          n.visited = true;
          stack.push(n);
        } else {
          stack.pop();
        }
      }
    }
  }

  /* ============================================================
     GAME STATE
  ============================================================ */
  const wallBaseColor = '#242424';
  const wallGlowColor = '#b6b6b6';
  const interactiveWallColor = '#a5b21f';
  const shardColor = 'rgba(150,200,255,1)';

  const interactiveMessages = [
    'The stone yields to your presence.',
    'A hidden path reveals itself.',
    'The wall remembers you.',
    'Something ancient lets you pass.',
    'The maze rearranges in your favor.'
  ];
  const shardMessages = [
    'A shard of memory hums in your hand.',
    'You feel a piece of yourself return.',
    'The chamber brightens for a moment.',
    'This fragment knows your name.',
    'Three will open the way.'
  ];
  const visionMessages = [
    'The vision stares back at you.',
    'You glimpse a path that never was.',
    'The maze breathes in unison with you.',
    'For a moment, you are the labyrinth.',
    'Silence speaks louder than stone.'
  ];

  let level = 1;
  let maze = null;
  let cellSizePx = 0;
  let mazeOffsetX = 0;
  let mazeOffsetY = 0;

  let player = {
    x: 0.5,
    y: 0.5,
    px: 0,
    py: 0,
    radius: 0,
    speed: 4
  };

  let exitCell = { x: 0, y: 0 };

  let interactiveWalls = [];
  let shards = [];
  let visions = [];

  let shardsCollected = 0;
  const shardsNeeded = 3;

  let lastMoveTime = performance.now();
  let flickerTimer = 0;
  let nextFlickerDelay = 0;
  let flickerActive = false;
  const flickerDuration = 200;

  let mazeFade = 1;

  let effect = null;

  let levelTransition = {
    active: false,
    phase: 'out',
    alpha: 0,
    startTime: 0,
    duration: 800,
    nextLevelPending: false
  };

  function randChoice(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  /* ============================================================
     LEVEL INIT
  ============================================================ */
  function initLevel() {
    const cols = 25 + level * 2;
    const rows = 14 + level * 2;

    maze = new Maze(cols, rows);

    const w = canvas.width;
    const h = canvas.height;
    cellSizePx = Math.min(w / cols, h / rows);
    mazeOffsetX = (w - cols * cellSizePx) / 2;
    mazeOffsetY = (h - rows * cellSizePx) / 2;

    player.radius = cellSizePx * 0.18;
    player.x = 0.5;
    player.y = 0.5;

    exitCell.x = cols - 1;
    exitCell.y = rows - 1;

    interactiveWalls = [];
    shards = [];
    visions = [];
    shardsCollected = 0;
    effect = null;

    const interactiveCount = 1 + Math.floor(Math.random() * 5);
    for (let i = 0; i < interactiveCount; i++) {
      const cx = Math.floor(Math.random() * cols);
      const cy = Math.floor(Math.random() * rows);
      const cell = maze.cell(cx, cy);
      const sides = ['top', 'right', 'bottom', 'left'].filter(s => cell.walls[s]);
      if (!sides.length) continue;
      const side = randChoice(sides);
      interactiveWalls.push({ x: cx, y: cy, side, active: true });
    }

    for (let i = 0; i < shardsNeeded; i++) {
      const cx = Math.floor(Math.random() * cols);
      const cy = Math.floor(Math.random() * rows);
      shards.push({
        x: cx + 0.5,
        y: cy + 0.5,
        active: true,
        alpha: 1,
        original: { x: cx + 0.5, y: cy + 0.5 }
      });
    }

    const visionCount = 2 + Math.floor(Math.random() * 4);
    for (let i = 0; i < visionCount; i++) {
      const cx = Math.floor(Math.random() * cols);
      const cy = Math.floor(Math.random() * rows);
      visions.push({
        x: cx + 0.5,
        y: cy + 0.5,
        active: true
      });
    }

    lastMoveTime = performance.now();
    scheduleNextFlicker();
    levelTransition.active = false;
  }

  function scheduleNextFlicker() {
    const now = performance.now();
    nextFlickerDelay = 800 + Math.random() * 2000;
    flickerTimer = now + nextFlickerDelay;
    flickerActive = false;
  }

  /* ============================================================
     COLLISION
  ============================================================ */
  function canMoveTo(nx, ny) {
    const cols = maze.cols;
    const rows = maze.rows;
    if (nx < 0.1 || ny < 0.1 || nx > cols - 0.1 || ny > rows - 0.1) return false;

    const cx = Math.floor(player.x);
    const cy = Math.floor(player.y);
    const cell = maze.cell(cx, cy);
    if (!cell) return false;

    const dx = nx - player.x;
    const dy = ny - player.y;

    if (dx > 0 && cell.walls.right && Math.floor(nx) > cx) return false;
    if (dx < 0 && cell.walls.left && Math.floor(nx) < cx) return false;
    if (dy > 0 && cell.walls.bottom && Math.floor(ny) > cy) return false;
    if (dy < 0 && cell.walls.top && Math.floor(ny) < cy) return false;

    return true;
  }

  /* ============================================================
     VISION EFFECTS
  ============================================================ */
  function triggerVisionEffect() {
    const now = performance.now();
    const options = ['shake', 'hideShards', 'mazeInvisible', 'message', 'shardsScatter', 'flip'];
    const type = randChoice(options);

    if (type === 'message') {
      openModal(randChoice(visionMessages));
      return;
    }

    if (type === 'shake') {
      effect = { type, endTime: now + 5000 };
    } else if (type === 'hideShards') {
      effect = { type, endTime: now + 3000 };
    } else if (type === 'mazeInvisible') {
      effect = { type, endTime: now + 8000 };
    } else if (type === 'shardsScatter') {
      const original = shards.map(s => ({ x: s.x, y: s.y }));
      for (const s of shards) {
        s.x += (Math.random() * 6 + 4) * (Math.random() < 0.5 ? -1 : 1);
        s.y += (Math.random() * 6 + 4) * (Math.random() < 0.5 ? -1 : 1);
      }
      effect = { type, endTime: now + 4000, original };
    } else if (type === 'flip') {
      effect = { type, endTime: now + 5000 };
    }
  }

  function updateVisionEffect() {
    if (!effect) return;
    const now = performance.now();
    if (now >= effect.endTime) {
      if (effect.type === 'shardsScatter') {
        for (let i = 0; i < shards.length; i++) {
          shards[i].x = effect.original[i].x;
          shards[i].y = effect.original[i].y;
        }
      }
      effect = null;
    }
  }

  /* ============================================================
     LEVEL TRANSITION
  ============================================================ */
  function startLevelTransition() {
    levelTransition.active = true;
    levelTransition.phase = 'out';
    levelTransition.alpha = 0;
    levelTransition.startTime = performance.now();
    levelTransition.nextLevelPending = true;
  }

  function updateLevelTransition(dt) {
    if (!levelTransition.active) return;
    const now = performance.now();
    const t = (now - levelTransition.startTime) / levelTransition.duration;

    if (levelTransition.phase === 'out') {
      levelTransition.alpha = Math.min(1, t);
      if (t >= 1) {
        if (levelTransition.nextLevelPending) {
          level++;
          initLevel();
          levelTransition.phase = 'in';
          levelTransition.startTime = performance.now();
          levelTransition.nextLevelPending = false;
        } else {
          levelTransition.active = false;
        }
      }
    } else {
      levelTransition.alpha = 1 - Math.min(1, t);
      if (t >= 1) {
        levelTransition.active = false;
      }
    }
  }

  /* ============================================================
     UPDATE
  ============================================================ */
  let lastTime = performance.now();

  function update(dt) {
    const now = performance.now();

    if (!modalOpen && now >= flickerTimer && !flickerActive) {
      flickerActive = true;
      setTimeout(() => {
        flickerActive = false;
        scheduleNextFlicker();
      }, flickerDuration);
    }

    const idleTime = now - lastMoveTime;
    if (idleTime > 700) {
      mazeFade = Math.max(0.2, mazeFade - dt * 0.0005);
    } else {
      mazeFade = Math.min(1, mazeFade + dt * 0.0015);
    }

    updateVisionEffect();

    const movementLocked = modalOpen || (effect && effect.type === 'shake');

    let moving = false;
    if (!movementLocked) {
      let vx = 0, vy = 0;
      if (keys.ArrowUp || keys.w) vy -= 1;
      if (keys.ArrowDown || keys.s) vy += 1;
      if (keys.ArrowLeft || keys.a) vx -= 1;
      if (keys.ArrowRight || keys.d) vx += 1;

      if (vx !== 0 || vy !== 0) {
        const len = Math.hypot(vx, vy) || 1;
        vx /= len;
        vy /= len;
        const dist = player.speed * (dt / 16.67);
        const nx = player.x + vx * dist / cellSizePx;
        const ny = player.y + vy * dist / cellSizePx;
        if (canMoveTo(nx, ny)) {
          player.x = nx;
          player.y = ny;
          moving = true;
        }
      }
    }

    player.px = mazeOffsetX + player.x * cellSizePx;
    player.py = mazeOffsetY + player.y * cellSizePx;

    if (moving) lastMoveTime = now;

    for (const iw of interactiveWalls) {
      if (!iw.active) continue;
      const dx = player.x - (iw.x + 0.5);
      const dy = player.y - (iw.y + 0.5);
      if (Math.hypot(dx, dy) < 1.2) {
        iw.active = false;
        openModal(randChoice(interactiveMessages));
      }
    }

    for (const s of shards) {
      if (!s.active) {
        if (s.alpha > 0) {
          s.alpha -= dt * 0.001;
          if (s.alpha < 0) s.alpha = 0;
        }
        continue;
      }
      const dx = player.x - s.x;
      const dy = player.y - s.y;
      if (Math.hypot(dx, dy) < 0.5) {
        s.active = false;
        shardsCollected++;
        openModal(randChoice(shardMessages));
      }
    }

    for (const v of visions) {
      if (!v.active) continue;
      const dx = player.x - v.x;
      const dy = player.y - v.y;
      if (Math.hypot(dx, dy) < 0.5) {
        v.active = false;
        triggerVisionEffect();
      }
    }

    if (shardsCollected >= shardsNeeded && !levelTransition.active) {
      const dx = player.x - (exitCell.x + 0.5);
      const dy = player.y - (exitCell.y + 0.5);
      if (Math.hypot(dx, dy) < 0.6) {
        startLevelTransition();
      }
    }

    updateLevelTransition(dt);
  }

  /* ============================================================
     DRAW HELPERS
  ============================================================ */
  function applyShakeAndFlip() {
    if (effect && effect.type === 'flip') {
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
    }
    if (effect && effect.type === 'shake') {
      const mag = 6;
      ctx.translate((Math.random() - 0.5) * mag, (Math.random() - 0.5) * mag);
    }
  }

  function drawMazeBase() {
    const cols = maze.cols;
    const rows = maze.rows;

    ctx.save();
    applyShakeAndFlip();
    ctx.translate(mazeOffsetX, mazeOffsetY);

    let alpha = mazeFade;
    if (flickerActive) alpha *= 0.3 + Math.random() * 0.4;
    if (effect && effect.type === 'mazeInvisible') alpha = 0;

    ctx.globalAlpha = alpha;
    ctx.lineCap = 'round';

    const maxDist = Math.hypot(cols - 1, rows - 1);

    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const cell = maze.cell(x, y);
        const px = x * cellSizePx;
        const py = y * cellSizePx;

        const distFromStart = Math.hypot(x, y);
        const t = distFromStart / maxDist; // 0 near start, 1 deep

        const baseWidth = cellSizePx * 0.12;
        const widthJitter = (t * 0.25 + 0.05) * (Math.random() - 0.5);
        const lineWidth = baseWidth + widthJitter;

        const brightnessFactor = 1 - t * 0.08;
        const baseCol = 0x24;
        const colVal = Math.max(0, Math.min(255, Math.round(baseCol * brightnessFactor)));
        const color = `rgb(${colVal},${colVal},${colVal})`;

        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;

        const walls = ['top', 'right', 'bottom', 'left'];
        for (const side of walls) {
          if (!cell.walls[side]) continue;

          const jitter = (t * 0.4 + 0.1);
          const jx = (Math.random() - 0.5) * jitter;
          const jy = (Math.random() - 0.5) * jitter;

          ctx.beginPath();
          if (side === 'top') {
            ctx.moveTo(px + jx, py + jy);
            ctx.lineTo(px + cellSizePx + jx, py + jy);
          } else if (side === 'right') {
            ctx.moveTo(px + cellSizePx + jx, py + jy);
            ctx.lineTo(px + cellSizePx + jx, py + cellSizePx + jy);
          } else if (side === 'bottom') {
            ctx.moveTo(px + jx, py + cellSizePx + jy);
            ctx.lineTo(px + cellSizePx + jx, py + cellSizePx + jy);
          } else if (side === 'left') {
            ctx.moveTo(px + jx, py + jy);
            ctx.lineTo(px + jx, py + cellSizePx + jy);
          }
          ctx.stroke();
        }

        for (const iw of interactiveWalls) {
          if (!iw.active) continue;
          if (iw.x === x && iw.y === y) {
            ctx.strokeStyle = interactiveWallColor;
            ctx.lineWidth = lineWidth * 1.1;
            ctx.beginPath();
            if (iw.side === 'top') {
              ctx.moveTo(px, py);
              ctx.lineTo(px + cellSizePx, py);
            } else if (iw.side === 'right') {
              ctx.moveTo(px + cellSizePx, py);
              ctx.lineTo(px + cellSizePx, py + cellSizePx);
            } else if (iw.side === 'bottom') {
              ctx.moveTo(px, py + cellSizePx);
              ctx.lineTo(px + cellSizePx, py + cellSizePx);
            } else if (iw.side === 'left') {
              ctx.moveTo(px, py);
              ctx.lineTo(px, py + cellSizePx);
            }
            ctx.stroke();
          }
        }
      }
    }

    const ex = (exitCell.x + 0.5) * cellSizePx;
    const ey = (exitCell.y + 0.5) * cellSizePx;
    const r = cellSizePx * 0.35;
    const g = ctx.createRadialGradient(ex, ey, r * 0.2, ex, ey, r);
    if (shardsCollected >= shardsNeeded) {
      g.addColorStop(0, 'rgba(120,200,255,1)');
      g.addColorStop(1, 'rgba(120,200,255,0)');
    } else {
      g.addColorStop(0, 'rgba(80,80,120,1)');
      g.addColorStop(1, 'rgba(80,80,120,0)');
    }
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(ex, ey, r, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawGlowWallsNearPlayer(moving) {
    if (!moving) return;
    const cols = maze.cols;
    const rows = maze.rows;

    ctx.save();
    applyShakeAndFlip();
    ctx.translate(mazeOffsetX, mazeOffsetY);

    const radiusCells = 2.5;
    const px = player.x;
    const py = player.y;

    ctx.lineWidth = cellSizePx * 0.16;
    ctx.strokeStyle = wallGlowColor;

    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const dx = x + 0.5 - px;
        const dy = y + 0.5 - py;
        if (Math.hypot(dx, dy) > radiusCells) continue;
        const cell = maze.cell(x, y);
        const cx = x * cellSizePx;
        const cy = y * cellSizePx;

        const walls = ['top', 'right', 'bottom', 'left'];
        for (const side of walls) {
          if (!cell.walls[side]) continue;
          ctx.globalAlpha = 0.25;
          ctx.beginPath();
          if (side === 'top') {
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + cellSizePx, cy);
          } else if (side === 'right') {
            ctx.moveTo(cx + cellSizePx, cy);
            ctx.lineTo(cx + cellSizePx, cy + cellSizePx);
          } else if (side === 'bottom') {
            ctx.moveTo(cx, cy + cellSizePx);
            ctx.lineTo(cx + cellSizePx, cy + cellSizePx);
          } else if (side === 'left') {
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx, cy + cellSizePx);
          }
          ctx.stroke();
        }
      }
    }

    ctx.restore();
  }

  function drawShards() {
    if (effect && effect.type === 'hideShards') return;

    ctx.save();
    applyShakeAndFlip();
    ctx.translate(mazeOffsetX, mazeOffsetY);

    for (const s of shards) {
      if (!s.active && s.alpha <= 0) continue;
      const px = s.x * cellSizePx;
      const py = s.y * cellSizePx;
      ctx.globalAlpha = s.alpha;
      const r = cellSizePx * 0.18;
      const grad = ctx.createRadialGradient(px, py, r * 0.2, px, py, r);
      grad.addColorStop(0, shardColor);
      grad.addColorStop(1, 'rgba(150,200,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(px, py, r, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  function drawVisions() {
    ctx.save();
    applyShakeAndFlip();
    ctx.translate(mazeOffsetX, mazeOffsetY);

    const t = performance.now() * 0.003;
    for (const v of visions) {
      if (!v.active) continue;
      const px = v.x * cellSizePx;
      const py = v.y * cellSizePx;
      const baseR = cellSizePx * 0.06;
      const r = baseR * (1 + 0.3 * Math.sin(t + px * 0.1));
      const grad = ctx.createRadialGradient(px, py, r * 0.1, px, py, r * 2.2);
      grad.addColorStop(0, 'rgba(255,255,255,1)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(px, py, r * 2.2, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  function drawPlayer() {
    ctx.save();
    applyShakeAndFlip();

    const t = performance.now() * 0.002;
    const auraR = player.radius * (4 + Math.sin(t) * 0.6);
    const grad = ctx.createRadialGradient(player.px, player.py, player.radius * 0.2, player.px, player.py, auraR);
    grad.addColorStop(0, 'rgba(255,255,255,1)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.arc(player.px, player.py, auraR, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(player.px, player.py, player.radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawHUD() {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, 180, 40);
    ctx.fillStyle = '#ccc';
    ctx.font = '12px system-ui';
    ctx.textBaseline = 'top';
    ctx.fillText('Level: ' + level, 10, 8);
    ctx.fillText('Shards: ' + shardsCollected + '/' + shardsNeeded, 10, 22);
    ctx.restore();
  }

  /* ============================================================
     RENDER
  ============================================================ */
  function render(dt) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const now = performance.now();
    const idleTime = now - lastMoveTime;
    const moving = idleTime < 80;

    drawMazeBase();
    drawGlowWallsNearPlayer(moving);
    drawShards();
    drawVisions();
    drawPlayer();
    drawHUD();

    if (levelTransition.active) {
      ctx.save();
      ctx.globalAlpha = levelTransition.alpha;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }
  }

  /* ============================================================
     LOOP
  ============================================================ */
  function loop() {
    const now = performance.now();
    const dt = now - lastTime;
    lastTime = now;

    update(dt);
    render(dt);

    requestAnimationFrame(loop);
  }

  initLevel();
  loop();
})();
</script>
</body>
</html>
