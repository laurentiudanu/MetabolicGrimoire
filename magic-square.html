<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3x3 Magic Square</title>
    <style>
        html, body {min-height: 100vh;}
        article, aside, details, figcaption, figure, footer, header, hgroup, menu, nav, section, summary, main {display: block;}
        html, body, div, span, object, iframe, h1, h2, h3, h4, h5, h6, p, blockquote, pre, abbr, address, cite, code, del, dfn, em, img, ins, kbd, q, samp, small, strong, sub, sup, var, b, i, dl, dt, dd, ol, ul, li, fieldset, form, label, legend, table, caption, tbody, tfoot, thead, tr, th, td, article, aside, canvas, details, figcaption, figure, footer, header, hgroup, menu, nav, section, summary, time, mark, audio, video, main {margin: 0;padding: 0;border: 0;outline: 0;font-size: 100%;vertical-align: baseline;background: transparent;/* margin: -7px; */}
        ol, ul {list-style:none;}
        blockquote, q {quotes: none;}
        blockquote:before, blockquote:after,  q:before, q:after {content:''; content:none;}
        del {text-decoration: line-through;}
        svg:not(:root) {overflow: hidden;}
        abbr[title], dfn[title] {border-bottom: 1px dotted; cursor: help;}
        table {width: 100%; border-collapse: collapse; border-spacing: 0; empty-cells: show; table-layout: fixed;}
        input, select {vertical-align: middle;}
        input[type="radio"] {vertical-align: text-bottom;}
        input[type="checkbox"] {vertical-align: bottom;}
        button, input, select, textarea {margin: 0; font-family: "Source Sans Pro", "Lucida Sans Unicode", Sora, Arial, Verdana, sans-serif;}
        textarea {resize: none;}
        button, html input[type="button"], input[type="reset"], input[type="submit"] {-webkit-appearance: button; cursor: pointer;}
        button[disabled], html input[disabled] {cursor: default;}
        input[type="checkbox"], input[type="radio"] {box-sizing: border-box; padding: 0; *height: 13px; *width: 13px;}
        img {display: block;max-width: 100%;height: auto !important;}
        td img {vertical-align: top;}
        address {display: inline;}
        code, kbd, pre, samp {font-family: monospace, serif; font-size: 16px;}
        pre {white-space: pre; white-space: pre-wrap; word-wrap: break-word;}
        a:hover, a:active {outline: none;}
        a, a:hover, a:visited {text-decoration: none;}
        iframe {display: block;max-width: 100%;height: 500px;}
        fieldset {border: 1px solid #c0c0c0;padding: 16px;}
        ::-webkit-input-placeholder {color: #8E8E8E; font-family: "Helvetica", Arial, sans-serif; font-size: 16px; font-weight: 700;}
        :focus::-webkit-input-placeholder {opacity: 0.4;}
        :-moz-placeholder {color: #8E8E8E; font-family: "Helvetica", Arial, sans-serif; font-size: 16px; font-weight: 700;}
        :focus:-moz-placeholder {opacity: 0.4;}
        *, *:before, *:after {-webkit-box-sizing: border-box;-moz-box-sizing: border-box;box;box-sizing: border-box;}
        body { 
            height: 100vh;
            font: 16px/1.6em "Helvetica", Arial, sans-serif;
            background-color: #c3bccf;
            color: #071B1B;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            position: relative;
            display: flex; 
            flex-direction: row; 
            flex-wrap: wrap;
            align-items: center;
        }
        canvas { background: #beb5d0; border: 4px solid #5d4c7b; cursor: pointer; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        button { padding: 12px 24px; font-size: 14px; text-transform: uppercase; cursor: pointer; background: #6123cb; color: white; border: none; border-radius: 4px; font-weight: 700;}
        .status { padding-top: 12px; font-weight: bold; margin-bottom: 24px;}
        .row {max-width: 100%; flex-basis: 100%; text-align: center;}
        h2 {
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5d4c7b;
        }
    </style>
</head>
<body>
    <!-- https://gemini.google.com/app/79198c0707b9bbc6 -->
     <div class="row">
        <h2>Sum to 15</h2>
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        <div id="message" class="status">Fill the grid so every line adds to 15!</div>
        <button onclick="initGame()">New Puzzle</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msg = document.getElementById('message');
    
    let grid = [0, 0, 0, 0, 0, 0, 0, 0, 0];
    let initialIndices = []; // To keep track of "locked" numbers
    let selectedCell = null;

    function initGame() {
        // A classic 3x3 magic square pattern
        const base = [8, 1, 6, 3, 5, 7, 4, 9, 2];
        
        // Randomly hide 5 cells to create the puzzle
        grid = base.map(val => (Math.random() > 0.5 ? val : 0));
        
        // Store which ones were pre-filled so user can't change them
        initialIndices = grid.map((val, i) => val !== 0 ? i : -1).filter(i => i !== -1);
        
        msg.innerText = "Fill the zeros! (Click a cell to cycle 1-9)";
        msg.style.color = "#000";
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let i = 0; i < 9; i++) {
            let x = (i % 3) * 100;
            let y = Math.floor(i / 3) * 100;
            
            // Draw Cell
            ctx.strokeStyle = "#333";
            ctx.strokeRect(x, y, 100, 100);
            
            // Highlight pre-filled numbers
            if (initialIndices.includes(i)) {
                ctx.fillStyle = "#dcd8e4";
                ctx.fillRect(x + 2, y + 2, 96, 96);
            }

            // Draw Number
            ctx.font = "32px Arial";
            ctx.fillStyle = initialIndices.includes(i) ? "#000" : "#007bff";
            let val = grid[i] === 0 ? "" : grid[i];
            ctx.fillText(val, x + 40, y + 60);
        }
    }

    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        
        const col = Math.floor(mouseX / 100);
        const row = Math.floor(mouseY / 100);
        const index = row * 3 + col;

        // Only allow changing cells that weren't pre-filled
        if (!initialIndices.includes(index)) {
            grid[index] = (grid[index] % 9) + 1;
            draw();
            checkWin();
        }
    });

    canvas.addEventListener('touchstart', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        
        const col = Math.floor(mouseX / 100);
        const row = Math.floor(mouseY / 100);
        const index = row * 3 + col;

        // Only allow changing cells that weren't pre-filled
        if (!initialIndices.includes(index)) {
            grid[index] = (grid[index] % 9) + 1;
            draw();
            checkWin();
        }
    });

    function checkWin() {
        if (grid.includes(0)) return;

        const lines = [
            [0,1,2], [3,4,5], [6,7,8], // Rows
            [0,3,6], [1,4,7], [2,5,8], // Cols
            [0,4,8], [2,4,6]           // Diagonals
        ];

        const isMagic = lines.every(line => {
            return (grid[line[0]] + grid[line[1]] + grid[line[2]]) === 15;
        });

        // Check for duplicates (Magic squares must use unique numbers 1-9)
        const unique = new Set(grid).size === 9;

        if (isMagic && unique) {
            msg.innerText = "Correct!";
            msg.style.color = "#1012ad";
        } else if (!unique) {
            msg.innerText = "Numbers must be unique (1-9)!";
            msg.style.color = "#9f1222";
        }
    }

    initGame();
</script>
</body>
</html>
