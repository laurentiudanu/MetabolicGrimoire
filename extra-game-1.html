<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maze Shards</title>
<style>
  html, body {min-height: 100vh;}
  article, aside, details, figcaption, figure, footer, header, hgroup, menu, nav, section, summary, main {display: block;}
  html, body, div, span, object, iframe, h1, h2, h3, h4, h5, h6, p, blockquote, pre, abbr, address, cite, code, del, dfn, em, img, ins, kbd, q, samp, small, strong, sub, sup, var, b, i, dl, dt, dd, ol, ul, li, fieldset, form, label, legend, table, caption, tbody, tfoot, thead, tr, th, td, article, aside, canvas, details, figcaption, figure, footer, header, hgroup, menu, nav, section, summary, time, mark, audio, video, main {margin: 0;padding: 0;border: 0;outline: 0;font-size: 100%;vertical-align: baseline;background: transparent;/* margin: -7px; */}
  ol, ul {list-style:none;}
  blockquote, q {quotes: none;}
  blockquote:before, blockquote:after,  q:before, q:after {content:''; content:none;}
  del {text-decoration: line-through;}
  svg:not(:root) {overflow: hidden;}
  abbr[title], dfn[title] {border-bottom: 1px dotted; cursor: help;}
  table {width: 100%; border-collapse: collapse; border-spacing: 0; empty-cells: show; table-layout: fixed;}
  input, select {vertical-align: middle;}
  input[type="radio"] {vertical-align: text-bottom;}
  input[type="checkbox"] {vertical-align: bottom;}
  button, input, select, textarea {margin: 0; font-family: "Source Sans Pro", "Lucida Sans Unicode", Sora, Arial, Verdana, sans-serif;}
  textarea {resize: none;}
  button, html input[type="button"], input[type="reset"], input[type="submit"] {-webkit-appearance: button; cursor: pointer;}
  button[disabled], html input[disabled] {cursor: default;}
  input[type="checkbox"], input[type="radio"] {box-sizing: border-box; padding: 0; *height: 13px; *width: 13px;}
  img {display: block;max-width: 100%;height: auto !important;}
  td img {vertical-align: top;}
  address {display: inline;}
  code, kbd, pre, samp {font-family: monospace, serif; font-size: 16px;}
  pre {white-space: pre; white-space: pre-wrap; word-wrap: break-word;}
  a:hover, a:active {outline: none;}
  a, a:hover, a:visited {text-decoration: none;}
  iframe {display: block;max-width: 100%;height: 500px;}
  fieldset {border: 1px solid #c0c0c0;padding: 16px;}
  ::-webkit-input-placeholder {color: #8E8E8E; font-family: "Helvetica", Arial, sans-serif; font-size: 16px; font-weight: 700;}
  :focus::-webkit-input-placeholder {opacity: 0.4;}
  :-moz-placeholder {color: #8E8E8E; font-family: "Helvetica", Arial, sans-serif; font-size: 16px; font-weight: 700;}
  :focus:-moz-placeholder {opacity: 0.4;}
  *, *:before, *:after {-webkit-box-sizing: border-box;-moz-box-sizing: border-box;box;box-sizing: border-box;}
  html, body {
    background: #000;
    overflow: hidden;
    height: 100%;
    width: 100%;
    font-family: "Helvetica", Arial, sans-serif;
    color: #eee;
  }
  canvas {
    display: block;
    background: #050505;
    margin: 0 auto;
  }
  #modalOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  #modalBox {
    background: #111;
    border: 1px solid #555;
    padding: 20px 30px;
    max-width: 480px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
  }
  #modalBox h2 {
    margin-top: 0;
    margin-bottom: 10px;
    font-size: 20px;
    color: #a5b21f;
  }
  #modalBox p {
    margin: 0 0 10px;
    line-height: 1.4;
  }
  #modalBox small {
    opacity: 0.7;
    font-size: 12px;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="modalOverlay">
  <div id="modalBox">
    <h2>Whisper in the Dark</h2>
    <p id="modalText"></p>
    <small>Press Enter or Escape to continue</small>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  // ---------- RESIZE TO FULL WINDOW 16:9 ----------
  function resizeCanvas() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const ratio = 16 / 9;
    let cw = w;
    let ch = Math.round(w / ratio);
    if (ch > h) {
      ch = h;
      cw = Math.round(h * ratio);
    }
    canvas.width = cw;
    canvas.height = ch;
  }
  window.addEventListener("resize", resizeCanvas);
  resizeCanvas();

  // ---------- GAME STATE ----------
  let level = 1;
  const mazeColsBase = 16;
  const mazeRowsBase = 9;
  let mazeCols = mazeColsBase;
  let mazeRows = mazeRowsBase;

  let cellSize;
  let maze;
  let wallsList = [];

  const WALL_COLOR = "#242424";
  const WALL_HIGHLIGHT = "#b6b6b6";
  const INTERACTIVE_COLOR = "#a5b21f";

  const player = {
    x: 0,
    y: 0,
    radius: 6,
    vx: 0,
    vy: 0
  };

  // Smooth movement
  const ACCEL = 900;
  const FRICTION = 8;
  const MAX_SPEED = 160;

  let exitCell = { c: 0, r: 0 };
  let shards = [];
  const requiredShards = 3;
  let collectedShards = 0;

  let interactiveWalls = [];
  const keys = {};
  let modalOpen = false;

  let isMoving = false;
  let lastMoveTime = performance.now();
  let mazeAlpha = 1;

  let flickerActive = false;
  let flickerTimer = null;

  let transitioning = false;
  let transitionAlpha = 0;

  const wallMessages = [
    "The wall crumbles as if it remembers you.",
    "A hidden path reveals itself in silence.",
    "Stone yields to your presence, reluctantly.",
    "The maze shifts, rewriting its own rules.",
    "You feel the chamber breathe as it opens."
  ];
  const shardMessages = [
    "A shard hums with distant memories.",
    "Light condenses into your grasp.",
    "The fragment warms your fingertips.",
    "You pocket a sliver of forgotten time.",
    "The shard resonates with your heartbeat."
  ];

  const modalOverlay = document.getElementById("modalOverlay");
  const modalText = document.getElementById("modalText");

  function showModal(text) {
    modalText.textContent = text;
    modalOverlay.style.display = "flex";
    modalOpen = true;
  }
  function hideModal() {
    modalOverlay.style.display = "none";
    modalOpen = false;
    lastMoveTime = performance.now();
  }

  document.addEventListener("keydown", e => {
    if (modalOpen) {
      if (e.key === "Enter" || e.key === "Escape") hideModal();
      return;
    }
    const k = e.key.toLowerCase();
    if (["arrowup","arrowdown","arrowleft","arrowright","w","a","s","d"].includes(k)) {
      keys[k] = true;
      e.preventDefault();
    }
  });
  document.addEventListener("keyup", e => {
    const k = e.key.toLowerCase();
    if (["arrowup","arrowdown","arrowleft","arrowright","w","a","s","d"].includes(k)) {
      keys[k] = false;
      e.preventDefault();
    }
  });

  // ---------- MAZE GENERATION ----------
  function generateMaze(cols, rows) {
    const grid = [];
    for (let r = 0; r < rows; r++) {
      const row = [];
      for (let c = 0; c < cols; c++) {
        row.push({
          c, r,
          visited: false,
          walls: { top: true, right: true, bottom: true, left: true }
        });
      }
      grid.push(row);
    }

    function neighbors(cell) {
      const list = [];
      const { c, r } = cell;
      if (r > 0) list.push(grid[r-1][c]);
      if (c < cols-1) list.push(grid[r][c+1]);
      if (r < rows-1) list.push(grid[r+1][c]);
      if (c > 0) list.push(grid[r][c-1]);
      return list.filter(n => !n.visited);
    }

    const stack = [];
    const start = grid[0][0];
    start.visited = true;
    stack.push(start);

    while (stack.length) {
      const current = stack[stack.length - 1];
      const unvisited = neighbors(current);
      if (!unvisited.length) {
        stack.pop();
      } else {
        const next = unvisited[Math.floor(Math.random() * unvisited.length)];
        if (next.r === current.r - 1) {
          current.walls.top = false;
          next.walls.bottom = false;
        } else if (next.c === current.c + 1) {
          current.walls.right = false;
          next.walls.left = false;
        } else if (next.r === current.r + 1) {
          current.walls.bottom = false;
          next.walls.top = false;
        } else if (next.c === current.c - 1) {
          current.walls.left = false;
          next.walls.right = false;
        }
        next.visited = true;
        stack.push(next);
      }
    }

    return grid;
  }

  function buildWallsList() {
    wallsList = [];
    for (let r = 0; r < mazeRows; r++) {
      for (let c = 0; c < mazeCols; c++) {
        const cell = maze[r][c];
        const x = c * cellSize;
        const y = r * cellSize;
        const s = cellSize;

        if (cell.walls.top)
          wallsList.push({ x1: x, y1: y, x2: x+s, y2: y, type: "solid", interactive: false, removed: false });
        if (cell.walls.right)
          wallsList.push({ x1: x+s, y1: y, x2: x+s, y2: y+s, type: "solid", interactive: false, removed: false });
        if (cell.walls.bottom)
          wallsList.push({ x1: x, y1: y+s, x2: x+s, y2: y+s, type: "solid", interactive: false, removed: false });
        if (cell.walls.left)
          wallsList.push({ x1: x, y1: y, x2: x, y2: y+s, type: "solid", interactive: false, removed: false });
      }
    }

    // broken walls
    for (const w of wallsList) {
      if (Math.random() < 0.18) w.type = "broken";
    }

    // interactive walls
    interactiveWalls = [];
    const count = 1 + Math.floor(Math.random() * 5);
    const candidates = wallsList.slice();
    for (let i = 0; i < count && candidates.length; i++) {
      const idx = Math.floor(Math.random() * candidates.length);
      const w = candidates.splice(idx, 1)[0];
      w.interactive = true;
      interactiveWalls.push(w);
    }
  }

  function setupEntities() {
    player.x = cellSize * 0.5;
    player.y = cellSize * 0.5;
    player.vx = 0;
    player.vy = 0;

    exitCell.c = mazeCols - 1;
    exitCell.r = mazeRows - 1;

    shards = [];
    collectedShards = 0;

    const used = new Set();
    while (shards.length < requiredShards) {
      const c = Math.floor(Math.random() * mazeCols);
      const r = Math.floor(Math.random() * mazeRows);
      const key = `${c},${r}`;
      if (used.has(key)) continue;
      used.add(key);
      if ((c === 0 && r === 0) || (c === exitCell.c && r === exitCell.r)) continue;
      shards.push({ c, r, alpha: 1, collected: false, fadeOut: false });
    }
  }

  function startFlickerLoop() {
    if (flickerTimer) return;
    const schedule = () => {
      const delay = 600 + Math.random() * 1600;
      flickerTimer = setTimeout(() => {
        flickerActive = true;
        setTimeout(() => {
          flickerActive = false;
          if (isMoving) schedule();
          else flickerTimer = null;
        }, 120 + Math.random() * 180);
      }, delay);
    };
    schedule();
  }
  function stopFlickerLoop() {
    if (flickerTimer) clearTimeout(flickerTimer);
    flickerTimer = null;
    flickerActive = false;
  }

  function randomFrom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function beginTransition(nextLevelCallback) {
    transitioning = true;
    transitionAlpha = 0;
    const duration = 700;
    const startTime = performance.now();

    function fadeOut(now) {
      const t = Math.min(1, (now - startTime) / duration);
      transitionAlpha = t;
      if (t < 1) {
        requestAnimationFrame(fadeOut);
      } else {
        nextLevelCallback();
        const start2 = performance.now();
        function fadeIn(now2) {
          const t2 = Math.min(1, (now2 - start2) / duration);
          transitionAlpha = 1 - t2;
          if (t2 < 1) requestAnimationFrame(fadeIn);
          else {
            transitionAlpha = 0;
            transitioning = false;
          }
        }
        requestAnimationFrame(fadeIn);
      }
    }
    requestAnimationFrame(fadeOut);
  }

  function newLevel() {
    level++;
    mazeCols = mazeColsBase + Math.floor(level / 2);
    mazeRows = mazeRowsBase + Math.floor(level / 3);
    const w = canvas.width;
    const h = canvas.height;
    cellSize = Math.min(w / mazeCols, h / mazeRows);
    maze = generateMaze(mazeCols, mazeRows);
    buildWallsList();
    setupEntities();
    lastMoveTime = performance.now();
    stopFlickerLoop();
  }

  function initLevel() {
    mazeCols = mazeColsBase;
    mazeRows = mazeRowsBase;
    const w = canvas.width;
    const h = canvas.height;
    cellSize = Math.min(w / mazeCols, h / mazeRows);
    maze = generateMaze(mazeCols, mazeRows);
    buildWallsList();
    setupEntities();
    lastMoveTime = performance.now();
  }
  initLevel();

  // ---------- COLLISION ----------
  function circleLineCollision(px, py, r, x1, y1, x2, y2) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const lengthSq = dx*dx + dy*dy;
    if (lengthSq === 0) {
      return Math.hypot(px - x1, py - y1) <= r;
    }
    let t = ((px - x1)*dx + (py - y1)*dy) / lengthSq;
    t = Math.max(0, Math.min(1, t));
    const cx = x1 + t * dx;
    const cy = y1 + t * dy;
    return Math.hypot(px - cx, py - cy) <= r;
  }

  function resolveCollisions(newX, newY) {
    let x = newX;
    let y = newY;
    const r = player.radius + 1;

    // keep inside map
    x = Math.max(r, Math.min(x, mazeCols * cellSize - r));
    y = Math.max(r, Math.min(y, mazeRows * cellSize - r));

    for (const w of wallsList) {
      if (w.removed) continue;
      if (circleLineCollision(x, y, r, w.x1, w.y1, w.x2, w.y2)) {
        const dx = w.x2 - w.x1;
        const dy = w.y2 - w.y1;
        const len = Math.hypot(dx, dy) || 1;
        const nx = -dy / len;
        const ny = dx / len;
        x += nx * 2;
        y += ny * 2;
      }
    }
    return { x, y };
  }

  // ---------- MOVEMENT ----------
  function updateMovement(dt) {
    let ax = 0, ay = 0;
    if (keys["arrowup"] || keys["w"]) ay -= 1;
    if (keys["arrowdown"] || keys["s"]) ay += 1;
    if (keys["arrowleft"] || keys["a"]) ax -= 1;
    if (keys["arrowright"] || keys["d"]) ax += 1;

    const moving = (ax !== 0 || ay !== 0);

    if (moving) {
      const len = Math.hypot(ax, ay) || 1;
      ax /= len;
      ay /= len;

      player.vx += ax * ACCEL * dt;
      player.vy += ay * ACCEL * dt;

      const sp = Math.hypot(player.vx, player.vy);
      if (sp > MAX_SPEED) {
        player.vx = (player.vx / sp) * MAX_SPEED;
        player.vy = (player.vy / sp) * MAX_SPEED;
      }

      lastMoveTime = performance.now();
    } else {
      player.vx -= player.vx * FRICTION * dt;
      player.vy -= player.vy * FRICTION * dt;
    }

    isMoving = moving;
  }

  // ---------- UPDATE ----------
  let lastTime = performance.now();

  function update(dt) {
    if (modalOpen || transitioning) return;

    updateMovement(dt);

    const newX = player.x + player.vx * dt;
    const newY = player.y + player.vy * dt;
    const resolved = resolveCollisions(newX, newY);
    player.x = resolved.x;
    player.y = resolved.y;

    // flicker control
    if (isMoving && !flickerTimer) startFlickerLoop();
    if (!isMoving && flickerTimer) stopFlickerLoop();

    // idle fade
    const now = performance.now();
    const idle = now - lastMoveTime;
    if (idle > 700) {
      const extra = idle - 700;
      const t = Math.min(1, extra / 2000);
      mazeAlpha = 1 - 0.7 * t;
    } else {
      mazeAlpha += (1 - mazeAlpha) * 0.1;
    }

    // interactive walls
    for (const w of interactiveWalls) {
      if (w.removed) continue;
      const cx = (w.x1 + w.x2) / 2;
      const cy = (w.y1 + w.y2) / 2;
      const dist = Math.hypot(player.x - cx, player.y - cy);
      if (dist < cellSize * 0.7) {
        w.removed = true;
        showModal(randomFrom(wallMessages));
        break;
      }
    }

    // shards
    for (const shard of shards) {
      if (shard.collected) continue;
      const sx = shard.c * cellSize + cellSize * 0.5;
      const sy = shard.r * cellSize + cellSize * 0.5;
      const dist = Math.hypot(player.x - sx, player.y - sy);
      if (dist < cellSize * 0.4) {
        shard.collected = true;
        shard.fadeOut = true;
        collectedShards++;
        showModal(randomFrom(shardMessages));
        break;
      }
    }

    for (const shard of shards) {
      if (shard.fadeOut) {
        shard.alpha -= dt * 2;
        if (shard.alpha <= 0) {
          shard.alpha = 0;
          shard.fadeOut = false;
        }
      }
    }

    // level complete
    if (collectedShards >= requiredShards) {
      const ex = exitCell.c * cellSize + cellSize * 0.5;
      const ey = exitCell.r * cellSize + cellSize * 0.5;
      const dist = Math.hypot(player.x - ex, player.y - ey);
      if (dist < cellSize * 0.5 && !transitioning) {
        beginTransition(() => newLevel());
      }
    }
  }

  // ---------- DRAW ----------
  function draw() {
    const w = canvas.width;
    const h = canvas.height;

    // background + flicker
    ctx.fillStyle = flickerActive ? "#050505" : "#000000";
    ctx.fillRect(0, 0, w, h);

    ctx.save();
    ctx.globalAlpha = mazeAlpha * (flickerActive ? 0.7 : 1);

    // walls
    ctx.lineWidth = 2;
    for (const seg of wallsList) {
      if (seg.removed) continue;

      const cx = (seg.x1 + seg.x2) / 2;
      const cy = (seg.y1 + seg.y2) / 2;
      const dist = Math.hypot(player.x - cx, player.y - cy);
      const near = dist < cellSize * 2.2;

      ctx.beginPath();
      ctx.moveTo(seg.x1, seg.y1);
      ctx.lineTo(seg.x2, seg.y2);

      if (seg.interactive && !seg.removed) {
        ctx.strokeStyle = INTERACTIVE_COLOR;
        ctx.shadowColor = INTERACTIVE_COLOR;
        ctx.shadowBlur = isMoving && near ? 10 : 0;
      } else if (near && isMoving) {
        ctx.strokeStyle = WALL_HIGHLIGHT;
        ctx.shadowColor = WALL_HIGHLIGHT;
        ctx.shadowBlur = 8;
      } else {
        ctx.strokeStyle = WALL_COLOR;
        ctx.shadowColor = "transparent";
        ctx.shadowBlur = 0;
      }

      if (seg.type === "broken") {
        ctx.setLineDash([6, 4, 2, 4]);
      } else {
        ctx.setLineDash([]);
      }

      ctx.stroke();
      ctx.setLineDash([]);
      ctx.shadowBlur = 0;
    }

    // exit portal
    const ex = exitCell.c * cellSize + cellSize * 0.5;
    const ey = exitCell.r * cellSize + cellSize * 0.5;
    const portalRadius = cellSize * 0.3;
    const shardsRatio = Math.min(1, collectedShards / requiredShards);
    const portalAlpha = 0.2 + 0.8 * shardsRatio;

    ctx.save();
    ctx.globalAlpha = portalAlpha * mazeAlpha;
    const grad = ctx.createRadialGradient(ex, ey, 0, ex, ey, portalRadius * 1.8);
    grad.addColorStop(0, "rgba(120,200,255,1)");
    grad.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(ex, ey, portalRadius * 1.8, 0, Math.PI * 2);
    ctx.fill();

    ctx.lineWidth = 3;
    ctx.strokeStyle = "rgba(180,230,255,0.9)";
    ctx.shadowColor = "rgba(180,230,255,1)";
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(ex, ey, portalRadius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // shards
    for (const shard of shards) {
      if (shard.alpha <= 0) continue;
      const sx = shard.c * cellSize + cellSize * 0.5;
      const sy = shard.r * cellSize + cellSize * 0.5;
      ctx.save();
      ctx.globalAlpha = shard.alpha * mazeAlpha;
      ctx.fillStyle = "#f5f1a0";
      ctx.shadowColor = "#f5f1a0";
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.moveTo(sx, sy - 6);
      ctx.lineTo(sx + 5, sy);
      ctx.lineTo(sx, sy + 6);
      ctx.lineTo(sx - 5, sy);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    ctx.restore(); // mazeAlpha

    // player glow
    ctx.save();
    const pulse = 0.6 + 0.4 * Math.sin(performance.now() / 600);
    const glowRadius = player.radius * 4 * (1 + 0.1 * pulse);
    const g = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, glowRadius);
    g.addColorStop(0, "rgba(230,230,230,0.9)");
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.arc(player.x, player.y, glowRadius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // player core
    ctx.save();
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // HUD
    ctx.save();
    ctx.fillStyle = "#888";
    ctx.font = "11px system-ui";
    ctx.textBaseline = "top";
    ctx.fillText(`Room ${level}. Collected shards: ${collectedShards}/${requiredShards}`.toUpperCase(), 10, 8);
    ctx.restore();

    // transition overlay
    if (transitionAlpha > 0) {
      ctx.save();
      ctx.globalAlpha = transitionAlpha;
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }
  }

  // ---------- LOOP ----------
  function loop(now) {
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
