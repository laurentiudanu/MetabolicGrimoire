<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AZEM [null chamber] - Stable Build</title>
<style>
  html, body { min-height: 100vh; margin: 0; padding: 0; overflow: hidden; background: #000; font-family: "Helvetica", Arial, sans-serif; color: #eee; }
  #gameCanvas { display: block; background: #000; }
  #ui-overlay { position: fixed; inset: 0; pointer-events: none; }
  #messageBox {
    position: absolute; max-width: 484px; left: 50%; top: 20%; transform: translateX(-50%);
    background: rgba(5, 5, 5, 0.98); border: 1px solid #444; padding: 24px 32px; border-radius: 4px;
    display: none; pointer-events: auto; box-shadow: 0 0 40px rgba(0,0,0,1); z-index: 100;
  }
  #messageBox h2 { margin: 0 0 16px; font-size: 18px; color: #ffd54a; text-transform: uppercase; letter-spacing: 2px; }
  #messageBox p { margin: 0 0 20px; font-size: 14px; line-height: 1.6; color: #ccc; }
  #messageBox button {
    position: absolute; right: 10px; top: 10px; background: #ffd54a; border: none;
    width: 24px; height: 24px; cursor: pointer; font-weight: bold;
  }
  #levelLabel { position: absolute; left: 20px; bottom: 20px; font-size: 10px; color: #444; letter-spacing: 1px; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui-overlay">
  <div id="levelLabel"></div>
  <div id="messageBox">
    <h2 id="messageTitle"></h2>
    <p id="messageText"></p>
    <button id="messageClose">&times;</button>
  </div>
</div>

<script>
/**
 * AZEM: THE NULL CHAMBER
 * Fixes: Reduced movement speed & Increased visibility radius.
 */

function azem() {
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const messageBox = document.getElementById("messageBox");
  const messageTitle = document.getElementById("messageTitle");
  const messageText = document.getElementById("messageText");
  const levelLabel = document.getElementById("levelLabel");
  const messageClose = document.getElementById("messageClose");

  let width, height, cellSize, cols, rows;
  let level = 1;
  let maze = [];
  let player = { x: 0, y: 0, vx: 0, vy: 0 };
  let keys = [];
  let keysCollected = 0;
  let exitCell = null;
  let exitVisible = false;
  let fadingIn = true, fadingOut = false, fadeAlpha = 1;
  let lastTime = 0;
  let input = { up: false, down: false, left: false, right: false };
  let messageOpen = false;
  
  // DYNAMIC TUNNEL VISION SETTINGS
  // Increased starting and target radius
  let tunnelRadius = 450; 
  let targetTunnelRadius = 450;

  let portals = []; 

  function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    if (cols) cellSize = Math.min(width / (cols + 2), height / (rows + 2));
  }
  window.addEventListener("resize", resize);

  const secureLetters = (n) => Array.from({length:n}, () => "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random()*26)]).join("");
  const tesseractCoord = () => `${Math.floor(Math.random()*5)}${Math.floor(Math.random()*5)}-${Math.floor(Math.random()*999)}`;

  function generateMaze() {
    cols = 10 + level * 2;
    rows = Math.floor(cols * (9/16));
    resize();
    maze = Array.from({ length: rows }, (_, y) => 
      Array.from({ length: cols }, (_, x) => ({
        x, y, visited: false,
        walls: { top: true, right: true, bottom: true, left: true }
      }))
    );

    const stack = [];
    const start = maze[0][0];
    start.visited = true;
    stack.push(start);

    while (stack.length > 0) {
      const curr = stack[stack.length - 1];
      const neighbors = [];
      if (curr.y > 0 && !maze[curr.y-1][curr.x].visited) neighbors.push(maze[curr.y-1][curr.x]);
      if (curr.x < cols-1 && !maze[curr.y][curr.x+1].visited) neighbors.push(maze[curr.y][curr.x+1]);
      if (curr.y < rows-1 && !maze[curr.y+1][curr.x].visited) neighbors.push(maze[curr.y+1][curr.x]);
      if (curr.x > 0 && !maze[curr.y][curr.x-1].visited) neighbors.push(maze[curr.y][curr.x-1]);

      if (neighbors.length) {
        const next = neighbors[Math.floor(Math.random() * neighbors.length)];
        if (next.x === curr.x) {
          if (next.y < curr.y) { curr.walls.top = false; next.walls.bottom = false; }
          else { curr.walls.bottom = false; next.walls.top = false; }
        } else {
          if (next.x < curr.x) { curr.walls.left = false; next.walls.right = false; }
          else { curr.walls.right = false; next.walls.left = false; }
        }
        next.visited = true;
        stack.push(next);
      } else {
        stack.pop();
      }
    }

    portals = [];
    for(let i=0; i < 2; i++) {
      let y1 = Math.floor(Math.random() * rows);
      let y2 = Math.floor(Math.random() * rows);
      maze[y1][0].walls.left = false;
      maze[y2][cols-1].walls.right = false;
      portals.push({ from: {x: -0.1, y: y1+0.5}, to: {x: cols-0.5, y: y2+0.5} });
      portals.push({ from: {x: cols+0.1, y: y2+0.5}, to: {x: 0.5, y: y1+0.5} });
    }
  }

  function setupLevel() {
    generateMaze();
    player.x = 0.5; player.y = 0.5;
    player.vx = 0; player.vy = 0;
    
    keys = [];
    for (let i = 0; i < 3; i++) {
      keys.push({ 
        x: Math.floor(Math.random() * cols) + 0.5, 
        y: Math.floor(Math.random() * rows) + 0.5, 
        collected: false, visible: i === 0 
      });
    }
    
    exitCell = { x: cols - 0.5, y: rows - 0.5 };
    exitVisible = false;
    keysCollected = 0;
    levelLabel.textContent = `LOC // ${secureLetters(1)}-${tesseractCoord()}`;
    fadingIn = true; fadeAlpha = 1;
  }

  window.onkeydown = e => {
    if (["ArrowUp","w"].includes(e.key)) input.up = true;
    if (["ArrowDown","s"].includes(e.key)) input.down = true;
    if (["ArrowLeft","a"].includes(e.key)) input.left = true;
    if (["ArrowRight","d"].includes(e.key)) input.right = true;
  };
  window.onkeyup = e => {
    if (["ArrowUp","w"].includes(e.key)) input.up = false;
    if (["ArrowDown","s"].includes(e.key)) input.down = false;
    if (["ArrowLeft","a"].includes(e.key)) input.left = false;
    if (["ArrowRight","d"].includes(e.key)) input.right = false;
  };

  function update(dt) {
    if (messageOpen) return;

    // MOVEMENT SPEED ADJUSTMENT
    // Lowered accel from 0.005 to 0.0025 for better control
    const accel = 0.0025;
    const friction = 0.85; 
    
    if (input.up) player.vy -= accel * dt;
    if (input.down) player.vy += accel * dt;
    if (input.left) player.vx -= accel * dt;
    if (input.right) player.vx += accel * dt;

    player.vx *= friction;
    player.vy *= friction;

    let nextX = player.x + player.vx;
    let nextY = player.y + player.vy;

    portals.forEach(p => {
      if (Math.hypot(nextX - p.from.x, nextY - p.from.y) < 0.4) {
        nextX = p.to.x;
        nextY = p.to.y;
      }
    });

    const cx = Math.floor(player.x), cy = Math.floor(player.y);
    const r = 0.25;
    const cell = maze[cy] ? maze[cy][cx] : null;

    if (cell) {
      if (cell.walls.top && nextY < cy + r) { nextY = cy + r; player.vy = 0; }
      if (cell.walls.bottom && nextY > cy + 1 - r) { nextY = cy + 1 - r; player.vy = 0; }
      if (cell.walls.left && nextX < cx + r) { nextX = cx + r; player.vx = 0; }
      if (cell.walls.right && nextX > cx + 1 - r) { nextX = cx + 1 - r; player.vx = 0; }
    }

    player.x = nextX;
    player.y = nextY;

    // INCREASED VISIBILITY CALCULATION
    const speed = Math.hypot(player.vx, player.vy);
    // Base radius increased to 500, with a more subtle shrink factor
    targetTunnelRadius = 500 - (speed * 600);
    tunnelRadius += (targetTunnelRadius - tunnelRadius) * 0.05;

    keys.forEach((k, i) => {
      if (!k.collected && k.visible && Math.hypot(player.x - k.x, player.y - k.y) < 0.4) {
        k.collected = true;
        keysCollected++;
        if (i < 2) keys[i+1].visible = true;
        else exitVisible = true;
        showMessage("FRAGMENT ACQUIRED", "The geometry yields. Proceed further into the void.");
      }
    });

    if (exitVisible && Math.hypot(player.x - exitCell.x, player.y - exitCell.y) < 0.5) {
      if (!fadingOut) {
        fadingOut = true;
        setTimeout(() => { level++; setupLevel(); fadingOut = false; }, 1000);
      }
    }

    if (fadingIn) { fadeAlpha -= 0.02; if (fadeAlpha <= 0) fadingIn = false; }
    if (fadingOut) { fadeAlpha += 0.02; if (fadeAlpha >= 1) fadeAlpha = 1; }
  }

  function showMessage(title, text) {
    messageTitle.textContent = title;
    messageText.textContent = text;
    messageBox.style.display = "block";
    messageOpen = true;
    messageClose.onclick = () => { messageBox.style.display = "none"; messageOpen = false; };
  }

  function draw() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, width, height);

    ctx.save();
    const offsetX = (width - cols * cellSize) / 2;
    const offsetY = (height - rows * cellSize) / 2;
    ctx.translate(offsetX, offsetY);

    ctx.strokeStyle = "#333";
    ctx.lineWidth = 2;
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const c = maze[y][x];
        const px = x * cellSize, py = y * cellSize;
        ctx.beginPath();
        if (c.walls.top) { ctx.moveTo(px, py); ctx.lineTo(px + cellSize, py); }
        if (c.walls.right) { ctx.moveTo(px + cellSize, py); ctx.lineTo(px + cellSize, py + cellSize); }
        if (c.walls.bottom) { ctx.moveTo(px + cellSize, py + cellSize); ctx.lineTo(px, py + cellSize); }
        if (c.walls.left) { ctx.moveTo(px, py + cellSize); ctx.lineTo(px, py); }
        ctx.stroke();
      }
    }

    portals.forEach(p => {
      ctx.shadowBlur = 15;
      ctx.shadowColor = "#4af";
      ctx.fillStyle = "rgba(64, 160, 255, 0.4)";
      ctx.beginPath();
      ctx.arc(p.from.x * cellSize, p.from.y * cellSize, cellSize/4, 0, Math.PI*2);
      ctx.fill();
    });

    keys.forEach(k => {
      if (k.visible && !k.collected) {
        ctx.shadowBlur = 10; ctx.shadowColor = "#ffd54a";
        ctx.fillStyle = "#ffd54a";
        ctx.fillRect(k.x * cellSize - 5, k.y * cellSize - 5, 10, 10);
      }
    });

    if (exitVisible) {
      ctx.shadowBlur = 20; ctx.shadowColor = "#f44";
      ctx.fillStyle = "#f44";
      ctx.beginPath();
      ctx.arc(exitCell.x * cellSize, exitCell.y * cellSize, cellSize/3, 0, Math.PI*2);
      ctx.fill();
    }

    const pX = player.x * cellSize, pY = player.y * cellSize;
    ctx.shadowBlur = 15; ctx.shadowColor = "#fff";
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(pX, pY, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // TUNNEL VISION OVERLAY
    ctx.save();
    const grad = ctx.createRadialGradient(
      offsetX + pX, offsetY + pY, tunnelRadius * 0.3,
      offsetX + pX, offsetY + pY, tunnelRadius
    );
    grad.addColorStop(0, "rgba(0,0,0,0)");
    grad.addColorStop(1, "rgba(0,0,0,1)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);
    ctx.restore();

    if (fadeAlpha > 0) {
      ctx.fillStyle = `rgba(0,0,0,${fadeAlpha})`;
      ctx.fillRect(0, 0, width, height);
    }
  }

  function loop(t) {
    const dt = t - lastTime;
    lastTime = t;
    update(dt || 16);
    draw();
    requestAnimationFrame(loop);
  }

  setupLevel();
  requestAnimationFrame(loop);
}

window.onload = () => {
  const box = document.getElementById("messageBox");
  document.getElementById("messageTitle").textContent = "THE GEOMETRY OF ISOLATION";
  document.getElementById("messageText").innerHTML = "The configuration is Non-Euclidean. The walls shift where they meet the edge.<br><br><em>Press WASD or Arrows to Move.</em>";
  box.style.display = "block";
  document.getElementById("messageClose").onclick = () => {
    box.style.display = "none";
    azem();
  };
};
</script>
</body>
</html>
